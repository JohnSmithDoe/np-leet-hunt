<svg xmlns="http://w3.org" viewBox="0 0 480 480" width="480" height="480">
    <defs>
        <!-- Sci-Fi Neon Glow Filter -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="6" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>

        <!-- Space Background Texture Pattern -->
        <pattern id="space-grid" width="30" height="30" patternUnits="userSpaceOnUse">
            <rect width="30" height="30" fill="#0D1B2A" stroke="#1B263B" stroke-width="1"/>
            <circle cx="15" cy="15" r="0.7" fill="#778DA9" opacity="0.6"/>
        </pattern>

        <!-- Fancy Cyber Frame Definition -->
        <g id="tile-frame">
            <!-- Outer Panel Background -->
            <rect width="118" height="118" x="1" y="1" rx="8" fill="url(#space-grid)" stroke="#415A77" stroke-width="2"/>
            <!-- Tech Corner Details -->
            <path d="M 6,1 L 18,1 M 1,6 L 1,18 M 112,1 L 100,1 M 119,6 L 119,18 M 6,119 L 18,119 M 1,112 L 1,100 M 112,119 L 100,119 M 119,112 L 119,100" stroke="#E0E1DD" stroke-width="2" stroke-linecap="round"/>
            <rect width="106" height="106" x="7" y="7" rx="4" fill="none" stroke="#1B263B" stroke-width="1" stroke-dasharray="4,4"/>
        </g>

        <!-- Path Styling (Neon-Kabel) -->
        <style>
          .energy-rail { fill: none; stroke: #00F5D4; stroke-width: 24; stroke-linecap: round; stroke-linejoin: round; filter: url(#glow); }
          .energy-core { fill: none; stroke: #FFFFFF; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; }
          .fusion-ring { fill: #00F5D4; filter: url(#glow); }
          .fusion-core { fill: #E0E1DD; }
          .fusion-center { fill: #0D1B2A; }
        </style>
    </defs>

    <!-- Base Grid Background Area -->
    <rect width="480" height="480" fill="#0A1128"/>

    <!-- ================= ROW 1 ================= -->
    <!-- Tile 1,1: Terminal South -->
    <g transform="translate(0, 0)">
        <use href="#tile-frame"/>
        <path class="energy-rail" d="M60,60 L60,120" />
        <path class="energy-core" d="M60,60 L60,120" />
        <circle class="fusion-ring" cx="60" cy="60" r="20" />
        <circle class="fusion-core" cx="60" cy="60" r="14" />
        <circle class="fusion-center" cx="60" cy="60" r="6" />
    </g>

    <!-- Tile 1,2: Corner Top-Left -->
    <g transform="translate(120, 0)">
        <use href="#tile-frame"/>
        <path class="energy-rail" d="M120,60 L60,60 L60,120" />
        <path class="energy-core" d="M120,60 L60,60 L60,120" />
    </g>

    <!-- Tile 1,3: T-Junction Down -->
    <g transform="translate(240, 0)">
        <use href="#tile-frame"/>
        <path class="energy-rail" d="M0,60 L120,60 M60,60 L60,120" />
        <path class="energy-core" d="M0,60 L120,60 M60,60 L60,120" />
    </g>

    <!-- Tile 1,4: Corner Top-Right -->
    <g transform="translate(360, 0)">
        <use href="#tile-frame"/>
        <path class="energy-rail" d="M0,60 L60,60 L60,120" />
        <path class="energy-core" d="M0,60 L60,60 L60,120" />
    </g>


    <!-- ================= ROW 2 ================= -->
    <!-- Tile 2,1: Straight Vertical -->
    <g transform="translate(0, 120)">
        <use href="#tile-frame"/>
        <path class="energy-rail" d="M60,0 L60,120" />
        <path class="energy-core" d="M60,0 L60,120" />
    </g>

    <!-- Tile 2,2: T-Junction Right -->
    <g transform="translate(120, 120)">
        <use href="#tile-frame"/>
        <path class="energy-rail" d="M60,0 L60,120 M60,60 L120,60" />
        <path class="energy-core" d="M60,0 L60,120 M60,60 L120,60" />
    </g>

    <!-- Tile 2,3: Crossroad -->
    <g transform="translate(240, 120)">
        <use href="#tile-frame"/>
        <path class="energy-rail" d="M0,60 L120,60 M60,0 L60,120" />
        <path class="energy-core" d="M0,60 L120,60 M60,0 L60,120" />
    </g>

    <!-- Tile 2,4: T-Junction Left -->
    <g transform="translate(360, 120)">
        <use href="#tile-frame"/>
        <path class="energy-rail" d="M60,0 L60,120 M0,60 L60,60" />
        <path class="energy-core" d="M60,0 L60,120 M0,60 L60,60" />
    </g>


    <!-- ================= ROW 3 ================= -->
    <!-- Tile 3,1: Terminal North -->
    <g transform="translate(0, 240)">
        <use href="#tile-frame"/>
        <path class="energy-rail" d="M60,0 L60,60" />
        <path class="energy-core" d="M60,0 L60,60" />
        <circle class="fusion-ring" cx="60" cy="60" r="20" />
        <circle class="fusion-core" cx="60" cy="60" r="14" />
        <circle class="fusion-center" cx="60" cy="60" r="6" />
    </g>

    <!-- Tile 3,2: Corner Bottom-Left -->
    <g transform="translate(120, 240)">
        <use href="#tile-frame"/>
        <path class="energy-rail" d="M60,0 L60,60 L120,60" />
        <path class="energy-core" d="M60,0 L60,60 L120,60" />
    </g>

    <!-- Tile 3,3: T-Junction Up -->
    <g transform="translate(240, 240)">
        <use href="#tile-frame"/>
        <path class="energy-rail" d="M0,60 L120,60 M60,0 L60,60" />
        <path class="energy-core" d="M0,60 L120,60 M60,0 L60,60" />
    </g>

    <!-- Tile 3,4: Corner Bottom-Right -->
    <g transform="translate(360, 240)">
        <use href="#tile-frame"/>
        <path class="energy-rail" d="M60,0 L60,60 L0,60" />
        <path class="energy-core" d="M60,0 L60,60 L0,60" />
    </g>


    <!-- ================= ROW 4 ================= -->
    <!-- Tile 4,1: Blank Structure Tile -->
    <g transform="translate(0, 360)">
        <use href="#tile-frame"/>
        <!-- Central decorative technical crosshair for empty tile -->
        <path d="M55,60 L65,60 M60,55 L60,65" stroke="#415A77" stroke-width="1.5"/>
    </g>

    <!-- Tile 4,2: Terminal East -->
    <g transform="translate(120, 360)">
        <use href="#tile-frame"/>
        <path class="energy-rail" d="M60,60 L120,60" />
        <path class="energy-core" d="M60,60 L120,60" />
        <circle class="fusion-ring" cx="60" cy="60" r="20" />
        <circle class="fusion-core" cx="60" cy="60" r="14" />
        <circle class="fusion-center" cx="60" cy="60" r="6" />
    </g>

    <!-- Tile 4,3: Straight Horizontal -->
    <g transform="translate(240, 360)">
        <use href="#tile-frame"/>
        <path class="energy-rail" d="M0,60 L120,60" />
        <path class="energy-core" d="M0,60 L120,60" />
    </g>

    <!-- Tile 4,4: Terminal West -->
    <g transform="translate(360, 360)">
        <use href="#tile-frame"/>
        <path class="energy-rail" d="M0,60 L60,60" />
        <path class="energy-core" d="M0,60 L60,60" />
        <circle class="fusion-ring" cx="60" cy="60" r="20" />
        <circle class="fusion-core" cx="60" cy="60" r="14" />
        <circle class="fusion-center" cx="60" cy="60" r="6" />
    </g>
</svg>
