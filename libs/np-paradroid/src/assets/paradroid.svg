<svg xmlns="http://w3.org" viewBox="0 0 480 480" width="480" height="480">
    <defs>
        <!-- Base Background Tile -->
        <rect id="bg" width="120" height="120" fill="#4CAF50" />

        <!-- Path Styling -->
        <style>
          .path { fill: none; stroke: #FFFFFF; stroke-width: 32; stroke-linecap: square; stroke-linejoin: miter; }
          .term-outer { fill: #FFFFFF; }
          .term-inner { fill: #37474F; }
        </style>
    </defs>

    <!-- ================= ROW 1 ================= -->
    <!-- Tile 1,1: Terminal South -->
    <g transform="translate(0, 0)">
        <use href="#bg"/>
        <path class="path" d="M60,60 L60,120" />
        <circle class="term-outer" cx="60" cy="60" r="22" />
        <circle class="term-inner" cx="60" cy="60" r="10" />
    </g>

    <!-- Tile 1,2: Corner Top-Left -->
    <g transform="translate(120, 0)">
        <use href="#bg"/>
        <path class="path" d="M120,60 L60,60 L60,120" />
    </g>

    <!-- Tile 1,3: T-Junction Down -->
    <g transform="translate(240, 0)">
        <use href="#bg"/>
        <path class="path" d="M0,60 L120,60 M60,60 L60,120" />
    </g>

    <!-- Tile 1,4: Corner Top-Right -->
    <g transform="translate(360, 0)">
        <use href="#bg"/>
        <path class="path" d="M0,60 L60,60 L60,120" />
    </g>


    <!-- ================= ROW 2 ================= -->
    <!-- Tile 2,1: Straight Vertical -->
    <g transform="translate(0, 120)">
        <use href="#bg"/>
        <path class="path" d="M60,0 L60,120" />
    </g>

    <!-- Tile 2,2: T-Junction Right -->
    <g transform="translate(120, 120)">
        <use href="#bg"/>
        <path class="path" d="M60,0 L60,120 M60,60 L120,60" />
    </g>

    <!-- Tile 2,3: Crossroad -->
    <g transform="translate(240, 120)">
        <use href="#bg"/>
        <path class="path" d="M0,60 L120,60 M60,0 L60,120" />
    </g>

    <!-- Tile 2,4: T-Junction Left -->
    <g transform="translate(360, 120)">
        <use href="#bg"/>
        <path class="path" d="M60,0 L60,120 M0,60 L60,60" />
    </g>


    <!-- ================= ROW 3 ================= -->
    <!-- Tile 3,1: Terminal North -->
    <g transform="translate(0, 240)">
        <use href="#bg"/>
        <path class="path" d="M60,0 L60,60" />
        <circle class="term-outer" cx="60" cy="60" r="22" />
        <circle class="term-inner" cx="60" cy="60" r="10" />
    </g>

    <!-- Tile 3,2: Corner Bottom-Left -->
    <g transform="translate(120, 240)">
        <use href="#bg"/>
        <path class="path" d="M60,0 L60,60 L120,60" />
    </g>

    <!-- Tile 3,3: T-Junction Up -->
    <g transform="translate(240, 240)">
        <use href="#bg"/>
        <path class="path" d="M0,60 L120,60 M60,0 L60,60" />
    </g>

    <!-- Tile 3,4: Corner Bottom-Right -->
    <g transform="translate(360, 240)">
        <use href="#bg"/>
        <path class="path" d="M60,0 L60,60 L0,60" />
    </g>


    <!-- ================= ROW 4 ================= -->
    <!-- Tile 4,1: Blank Solid Tile -->
    <g transform="translate(0, 360)">
        <use href="#bg"/>
    </g>

    <!-- Tile 4,2: Terminal East -->
    <g transform="translate(120, 360)">
        <use href="#bg"/>
        <path class="path" d="M60,60 L120,60" />
        <circle class="term-outer" cx="60" cy="60" r="22" />
        <circle class="term-inner" cx="60" cy="60" r="10" />
    </g>

    <!-- Tile 4,3: Straight Horizontal -->
    <g transform="translate(240, 360)">
        <use href="#bg"/>
        <path class="path" d="M0,60 L120,60" />
    </g>

    <!-- Tile 4,4: Terminal West -->
    <g transform="translate(360, 360)">
        <use href="#bg"/>
        <path class="path" d="M0,60 L60,60" />
        <circle class="term-outer" cx="60" cy="60" r="22" />
        <circle class="term-inner" cx="60" cy="60" r="10" />
    </g>
</svg>
