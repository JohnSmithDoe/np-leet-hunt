<ion-header>
    <ion-toolbar>
        <ion-buttons slot="start">
            <ion-menu-button></ion-menu-button>
            <ion-button aria-label='Space map' (click)='toMap()'>Map</ion-button>
            <ion-button aria-label='Planet event' (click)='toEvent()'>Event</ion-button>
            <ion-button aria-label='Paradroid duel' (click)='toDuel()'>Duel</ion-button>
            <ion-button aria-label='Pixel dungeon' (click)='toDungeon()'>Dungeon</ion-button>
            <ion-button aria-label='Boarding action' (click)='toBoarding()'>Board</ion-button>
            <ion-button aria-label='Sector guardian' (click)='toGuardian()'>Guardian</ion-button>
        </ion-buttons>
        <ion-buttons slot="end">
            <ion-button aria-label='Test SFX' (click)='playSfx()'>SFX</ion-button>
            <ion-button aria-label='Play theme song' (click)='playTheme()'>Theme</ion-button>
            <ion-button aria-label='Toggle sound' (click)='toggleMute()'>{{ muted() ? 'Sound off' : 'Sound on' }}</ion-button>
        </ion-buttons>
        <ion-title>Home</ion-title>
    </ion-toolbar>
</ion-header>
<ion-content>
    <div class="stage-host">
        <np-stage></np-stage>
        <np-planet-info></np-planet-info>
        <np-event-dialog></np-event-dialog>
        @if (!started()) {
            <div class="title-screen">
                <h1 class="title-name">LEET HUNT</h1>
                <p class="title-tagline">Reality is bent. A rescue run waits.</p>
                <button type="button" class="title-start" (click)="start()">▶ Enter the Hush</button>
                <p class="title-hint">click to begin — with sound</p>
            </div>
        }
    </div>
</ion-content>
