<ion-header>
    <ion-toolbar>
        <ion-buttons slot="start">
            <ion-menu-button></ion-menu-button>
            <ion-button aria-label='Space map' (click)='toSpace()'>
                <ion-icon name='heart' aria-hidden='true'></ion-icon>
            </ion-button>
            <ion-button aria-label='Paradroid duel' (click)='toParadroid()'>
                <ion-icon name='heart' aria-hidden='true'></ion-icon>
            </ion-button>
            <ion-button aria-label='Pixel dungeon' (click)='toPixeldungeon()'>
                <ion-icon name='heart' aria-hidden='true'></ion-icon>
            </ion-button>
        </ion-buttons>
        <ion-title>Home</ion-title>
    </ion-toolbar>
</ion-header>
<ion-content>
    <div class="stage-host">
        <np-stage></np-stage>
        <np-planet-info></np-planet-info>
        <np-event-dialog></np-event-dialog>
    </div>
</ion-content>
